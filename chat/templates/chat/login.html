  <!DOCTYPE html>
  <html>
  <head><title>Нэвтрэх</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; }
    input { display: block; width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
  </style>
  </head>
  <body>
    <h2>🔐 Нэвтрэх</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Нэвтрэх</button>
      <p>Бүртгэлгүй юу? <a href="/register/">Бүртгүүлэх</a></p>
    </form>
    
  </body>
  </html>
